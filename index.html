// ============================================================
// スコアリング
// ============================================================
function scoreHorse(h, isAreru) {
  const ep = parseInt(h.est_pop) || 99;
  const pt = parseInt(h.pop_tan) || 99;
  let score = 0;
  const reasons = [];
  const gap = pt - ep;
  if (gap >= 5) { score += 30; reasons.push(`推奨×実人気の乖離+${gap}（穴本命候補）`); }
  else if (gap >= 3) { score += 20; reasons.push(`乖離+${gap}（妙味あり）`); }
  else if (gap >= 1) { score += 10; reasons.push(`軽い妙味+${gap}`); }
  else if (gap <= -3) { score -= 20; reasons.push(`過剰人気（乖離${gap}）⚠️`); }
  else if (gap <= -1) { score -= 5; reasons.push(`やや過剰人気（${gap}）`); }
  const rb = { A: 25, B: 18, C: 8, D: -8, E: -18 };
  score += rb[h.rank] || 0;
  if (h.rank === "A" || h.rank === "B") reasons.push(`評価${h.rank}（信頼度高）`);
  if (h.rank === "D" || h.rank === "E") reasons.push(`評価${h.rank}（軽視推奨）`);
  if (h.rider_change) { score += 8; reasons.push("騎手乗り替わり"); }
  if (h.cond_change) { score += 10; reasons.push("条件変化プラス"); }
  if (h.bonpaso && /展開|出遅れ|不利|休み明け|斤量/.test(h.bonpaso)) {
    score += 6; reasons.push("前走凡走に明確な単発要因");
  }
  if (isAreru && gap >= 3 && (h.rank === "B" || h.rank === "C")) {
    score += 8; reasons.push("荒れレース×穴候補で加点");
  }
  if (pt >= 7 && pt <= 15 && (h.rank === "A" || h.rank === "B" || h.rank === "C")) {
    score += 5;
  }
  return { score, reasons };
}

function judgeConfidence(scored) {
  if (scored.length === 0) return { level: "none", label: "—", style: "" };
  const top = scored[0];
  const second = scored[1];
  const ep = parseInt(top.est_pop) || 99;
  const pt = parseInt(top.pop_tan) || 99;
  const margin = top.score - (second?.score || 0);
  if ((top.rank === "A" || top.rank === "B") && ep <= 3 && pt <= 5 && margin >= 15) {
    return { level: "high", label: "高（1頭軸推奨）", style: "bg-emerald-900/60 text-emerald-200 border-emerald-700" };
  }
  if ((top.rank === "A" || top.rank === "B" || top.rank === "C") && ep <= 5 && margin >= 8) {
    return { level: "mid", label: "中（2頭軸マルチ推奨）", style: "bg-amber-900/60 text-amber-200 border-amber-700" };
  }
  return { level: "low", label: "低（フォーメーション推奨）", style: "bg-rose-900/60 text-rose-200 border-rose-700" };
}

// ============================================================
// 荒れスコア（0-100）
// ============================================================
function calcArereScore(race, scored) {
  let s = 50; // ベース
  const factors = [];

  // ① 1番人気のオッズ
  const fav = scored.find(h => parseInt(h.pop_tan) === 1);
  if (fav) {
    const o = parseFloat(fav.odds) || 0;
    if (o > 0 && o < 2.5) { s -= 15; factors.push({ label: "1番人気が圧倒的(<2.5倍)", v: -15 }); }
    else if (o < 3.5) { s -= 8; factors.push({ label: "1番人気が堅い(<3.5倍)", v: -8 }); }
    else if (o >= 5.0) { s += 12; factors.push({ label: "1番人気が薄い(≥5.0倍)", v: 12 }); }
    else if (o >= 4.0) { s += 6; factors.push({ label: "1番人気がやや薄い(≥4.0倍)", v: 6 }); }
  }

  // ② 推奨1位の実人気順位
  const top = [...scored].sort((a,b) => (parseInt(a.est_pop)||99) - (parseInt(b.est_pop)||99))[0];
  if (top) {
    const tp = parseInt(top.pop_tan) || 99;
    if (tp >= 6) { s += 18; factors.push({ label: `推奨1位馬が${tp}人気と低評価`, v: 18 }); }
    else if (tp >= 4) { s += 8; factors.push({ label: `推奨1位馬が${tp}人気`, v: 8 }); }
    else if (tp <= 1) { s -= 8; factors.push({ label: "推奨1位＝1番人気で一致", v: -8 }); }
  }

  // ③ 7-15番人気帯のC評価以上の馬数
  const anaCandidates = scored.filter(h => {
    const pt = parseInt(h.pop_tan) || 99;
    return pt >= 7 && pt <= 15 && (h.rank === "A" || h.rank === "B" || h.rank === "C");
  }).length;
  if (anaCandidates >= 3) { s += 14; factors.push({ label: `穴候補(7-15人気のC以上)が${anaCandidates}頭`, v: 14 }); }
  else if (anaCandidates === 2) { s += 8; factors.push({ label: "穴候補が2頭", v: 8 }); }
  else if (anaCandidates === 1) { s += 3; factors.push({ label: "穴候補が1頭", v: 3 }); }

  // ④ 過剰人気の数
  const overhyped = scored.filter(h => parseInt(h.pop_tan) <= 3 && parseInt(h.est_pop) >= 7).length;
  if (overhyped >= 2) { s += 10; factors.push({ label: `過剰人気が${overhyped}頭`, v: 10 }); }
  else if (overhyped === 1) { s += 5; factors.push({ label: "過剰人気が1頭", v: 5 }); }

  // ⑤ 出走頭数
  const n = scored.length;
  if (n >= 16) { s += 8; factors.push({ label: `多頭数(${n}頭)`, v: 8 }); }
  else if (n <= 10) { s -= 5; factors.push({ label: `少頭数(${n}頭)`, v: -5 }); }

  // ⑥ ハンデ戦
  if (race.isHandicap) { s += 12; factors.push({ label: "ハンデ戦", v: 12 }); }

  // ⑦ レース格
  const cls = race.raceClass;
  if (cls === "G3" || cls === "L") { s += 4; factors.push({ label: `${cls}は荒れやすい`, v: 4 }); }
  if (cls === "新馬" || cls === "未勝利") { s += 6; factors.push({ label: `${cls}は読みにくい`, v: 6 }); }
  if (cls === "G1") { s -= 4; factors.push({ label: "G1は実力が反映されやすい", v: -4 }); }

  // ⑧ 馬場状態
  if (race.babaCondition === "重") { s += 8; factors.push({ label: "重馬場", v: 8 }); }
  else if (race.babaCondition === "不良") { s += 14; factors.push({ label: "不良馬場", v: 14 }); }
  else if (race.babaCondition === "稍重") { s += 4; factors.push({ label: "稍重馬場", v: 4 }); }

  // ⑨ 荒れるレース判定（ユーザー手動）
  if (race.isAreru) { s += 8; factors.push({ label: "荒れるレース判定ON", v: 8 }); }

  // ⑩ ダート
  if (race.track === "ダート") { s += 4; factors.push({ label: "ダート(穴出やすい)", v: 4 }); }

  s = Math.max(0, Math.min(100, s));
  return { score: s, factors };
}

// ============================================================
// 4象限判定
// ============================================================
function judgeQuadrant(arereScore, confLevel) {
  const high = arereScore >= 65;
  const mid = arereScore >= 40 && arereScore < 65;
  const low = arereScore < 40;

  if (high && confLevel === "high") {
    return { label: "⚡ 穴狙い大勝負", color: "emerald", advice: "荒れ要素あり、軸も信頼できる。穴2着3着固定で大きく狙える。3連複2頭軸推奨。" };
  }
  if (high && confLevel === "mid") {
    return { label: "💎 少額で穴狙い", color: "amber", advice: "荒れ要素あり、軸の信頼度はまずまず。点数を絞って少額で楽しむ。" };
  }
  if (high && confLevel === "low") {
    return { label: "🛑 見送り推奨", color: "rose", advice: "荒れる確率は高いが軸が読めない。投資は控え、観戦に徹するのが賢明。" };
  }
  if (mid && confLevel === "high") {
    return { label: "🎯 本命厚めで勝負", color: "emerald", advice: "標準的な展開で軸が固い。3連複1頭軸流しで厚めに。" };
  }
  if (mid && confLevel === "mid") {
    return { label: "📊 通常運用", color: "stone", advice: "標準。買い目通り適度に投資。" };
  }
  if (mid && confLevel === "low") {
    return { label: "⚠️ 慎重判断", color: "amber", advice: "荒れ要素中程度・軸不安。少額または見送り。" };
  }
  if (low && confLevel === "high") {
    return { label: "💰 堅め本命勝負", color: "emerald", advice: "荒れ要素少なく軸◎。本命厚めで取りこぼさない買い方を。" };
  }
  if (low && confLevel === "mid") {
    return { label: "📌 オッズ見極め", color: "stone", advice: "堅め決着が濃厚。配当が見合うか要確認。" };
  }
  return { label: "🚫 見送り推奨", color: "rose", advice: "荒れ要素も少なく軸も曖昧。妙味が薄い。見送り。" };
}

function buildBets(scored, confidence) {
  if (scored.length < 4) return [];
  const top = scored[0];
  const aite = scored.slice(1, 6);
  const bets = [];
  if (confidence.level === "high") {
    bets.push({
      label: "メイン：3連複1頭軸流し",
      formula: `軸=${top.uno}${top.name} → 相手 ${aite.map(x => x.uno).join("/")}`,
      points: 10, kind: "main",
    });
    const ana = scored.find((x, i) => i > 0 && (parseInt(x.pop_tan) - parseInt(x.est_pop)) >= 4);
    if (ana) {
      const others = scored.filter(x => x !== top && x !== ana).slice(0, 4);
      bets.push({
        label: "サブ：3連複2頭軸マルチ（穴特化）",
        formula: `軸=${top.uno}/${ana.uno} → 相手 ${others.map(x => x.uno).join("/")}`,
        points: 4, kind: "sub",
      });
    }
  } else if (confidence.level === "mid") {
    const top2 = scored[1];
    const others = scored.slice(2, 6);
    bets.push({
      label: "メイン：3連複2頭軸マルチ",
      formula: `軸=${top.uno}${top.name}/${top2.uno}${top2.name} → 相手 ${others.map(x => x.uno).join("/")}`,
      points: 4, kind: "main",
    });
    bets.push({
      label: "サブ：3連複1頭軸流し（信頼度ヘッジ）",
      formula: `軸=${top.uno} → 相手 ${scored.slice(1, 6).map(x => x.uno).join("/")}`,
      points: 10, kind: "sub",
    });
  } else {
    const c1 = scored.slice(0, 3);
    const c2 = scored.slice(0, 4);
    const c3 = scored.slice(0, 6);
    bets.push({
      label: "メイン：3連複フォーメーション",
      formula: `${c1.map(x => x.uno).join("/")} - ${c2.map(x => x.uno).join("/")} - ${c3.map(x => x.uno).join("/")}`,
      points: "計算要", kind: "main",
    });
  }
  return bets;
}

// ============================================================
// localStorage ユーティリティ
// ============================================================
const LS_PREFIX = "smartrc:race:";
const ls = {
  list() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(LS_PREFIX)) keys.push(k);
    }
    return keys;
  },
  get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
  delete(k) { localStorage.removeItem(k); },
};

  const [step, setStep] = useState(1);
  const [race, setRace] = useState({ name: "", course: "", distance: "", track: "芝", babaCondition: "良", isAreru: false, bias: "", isHandicap: false, raceClass: "OP" });
  const [horses, setHorses] = useState([emptyHorse(), emptyHorse(), emptyHorse()]);
  const [showResult, setShowResult] = useState(false);
  const [savedRaces, setSavedRaces] = useState([]);
  const [showSaved, setShowSaved] = useState(false);
  const [expandedHorse, setExpandedHorse] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const [importError, setImportError] = useState("");
  const [copied, setCopied] = useState(false);
  const [showStats, setShowStats] = useState(false);
  const [resultInputKey, setResultInputKey] = useState(null);
  const [resultDraft, setResultDraft] = useState(null);

  const refreshSaved = () => {
    const list = ls.list().map(k => ({ key: k, ...ls.get(k) })).filter(Boolean);
    list.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));
    setSavedRaces(list);
  };
  useEffect(() => { refreshSaved(); }, []);

  const updateHorse = (idx, field, value) => {
    const next = [...horses];
    next[idx] = { ...next[idx], [field]: value };
    setHorses(next);
  };
  const addHorse = () => setHorses([...horses, emptyHorse()]);
  const removeHorse = (idx) => setHorses(horses.filter((_, i) => i !== idx));

  const validHorses = horses.filter(h => h.uno && h.est_pop && h.pop_tan);
  const scored = validHorses.map(h => ({ ...h, ...scoreHorse(h, race.isAreru) })).sort((a, b) => b.score - a.score);
  const arere = calcArereScore(race, scored);
  const arereScoreVal = arere.score;
  const confidence = judgeConfidence(scored);
  const quadrant = judgeQuadrant(arereScoreVal, confidence.level);
  const bets = buildBets(scored, confidence);
  const overhyped = scored.filter(h => parseInt(h.pop_tan) <= 3 && parseInt(h.est_pop) >= 7);

  const saveRace = () => {
    const id = `${LS_PREFIX}${Date.now()}`;
    ls.set(id, { race, horses, savedAt: Date.now(), arereScore: arereScoreVal, confidence: confidence.level, quadrant: quadrant.label, bets });
    refreshSaved();
    alert("保存しました");
  };
  const loadRace = (saved) => {
    setRace(saved.race); setHorses(saved.horses);
    setShowSaved(false); setStep(1); setShowResult(false);
  };
  const deleteRace = (key) => {
    if (!confirm("削除しますか？")) return;
    ls.delete(key); refreshSaved();
  };
  const resetAll = () => {
    if (!confirm("入力をリセットしますか？")) return;
    setRace({ name: "", course: "", distance: "", track: "芝", babaCondition: "良", isAreru: false, bias: "", isHandicap: false, raceClass: "OP" });
    setHorses([emptyHorse(), emptyHorse(), emptyHorse()]);
    setShowResult(false); setStep(1);
  };
  const importData = () => {
    setImportError("");
    try {
      const p = JSON.parse(importText);
      if (!p.race || !p.horses) { setImportError("形式が正しくありません"); return; }
      setRace({
        name: p.race.name || "", course: p.race.course || "",
        distance: p.race.distance || "", track: p.race.track || "芝",
        babaCondition: p.race.babaCondition || "良",
        isAreru: !!p.race.isAreru, bias: p.race.bias || "",
        isHandicap: !!p.race.isHandicap, raceClass: p.race.raceClass || "OP",
      });
      const norm = p.horses.map(h => ({
        uno: String(h.uno || ""), name: h.name || "",
        est_pop: String(h.est_pop || ""), rank: h.rank || "C",
        odds: String(h.odds || ""), pop_tan: String(h.pop_tan || ""),
        rider_change: !!h.rider_change, cond_change: !!h.cond_change,
        bonpaso: h.bonpaso || "",
      }));
      setHorses(norm.length > 0 ? norm : [emptyHorse()]);
      setShowImport(false); setImportText(""); setStep(3); setShowResult(true);
    } catch (e) {
      setImportError("JSONエラー：" + e.message);
    }
  };
  const exportData = async () => {
    const json = JSON.stringify({ race, horses }, null, 2);
    try {
      await navigator.clipboard.writeText(json);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    } catch {
      setImportText(json);
    }
  };

  // 結果入力
  const openResultInput = (saved) => {
    setResultInputKey(saved.key);
    setResultDraft(saved.result || {
      rank1: "", rank2: "", rank3: "",
      payout_tan: "", payout_san3: "",
      purchased: "", returned: "", memo: ""
    });
  };
  const saveResult = () => {
    const target = savedRaces.find(r => r.key === resultInputKey);
    if (!target) return;
    const updated = { ...target };
    delete updated.key;
    updated.result = { ...resultDraft, enteredAt: Date.now() };
    ls.set(resultInputKey, updated);
    refreshSaved();
    setResultInputKey(null);
    setResultDraft(null);
    alert("結果を記録しました");
  };

  // 統計計算
  const calcStats = () => {
    const withResult = savedRaces.filter(s => s.result && s.result.purchased);
    if (withResult.length === 0) {
      return { total: 0, totalPurchased: 0, totalReturned: 0, recoveryRate: 0, hitRate: 0, hits: 0, byArere: [], topPayouts: [], byMonth: [] };
    }
    const totalPurchased = withResult.reduce((s, r) => s + (parseFloat(r.result.purchased) || 0), 0);
    const totalReturned = withResult.reduce((s, r) => s + (parseFloat(r.result.returned) || 0), 0);
    const hits = withResult.filter(r => (parseFloat(r.result.returned) || 0) > 0).length;

    // 荒れスコア帯別
    const bands = [
      { label: "0-30 (堅め)", min: 0, max: 30 },
      { label: "30-50 (標準)", min: 30, max: 50 },
      { label: "50-70 (荒れ気味)", min: 50, max: 70 },
      { label: "70-100 (大荒れ)", min: 70, max: 101 },
    ];
    const byArere = bands.map(b => {
      const races = withResult.filter(r => {
        const a = r.arereScore || 50;
        return a >= b.min && a < b.max;
      });
      const p = races.reduce((s, r) => s + (parseFloat(r.result.purchased) || 0), 0);
      const ret = races.reduce((s, r) => s + (parseFloat(r.result.returned) || 0), 0);
      const h = races.filter(r => (parseFloat(r.result.returned) || 0) > 0).length;
      return {
        label: b.label,
        races: races.length,
        purchased: p,
        returned: ret,
        recoveryRate: p > 0 ? (ret / p * 100) : 0,
        hitRate: races.length > 0 ? (h / races.length * 100) : 0,
      };
    });

    // TOP配当
    const topPayouts = [...withResult]
      .filter(r => (parseFloat(r.result.returned) || 0) > 0)
      .sort((a, b) => (parseFloat(b.result.returned) || 0) - (parseFloat(a.result.returned) || 0))
      .slice(0, 5);

    // 月別
    const monthMap = {};
    withResult.forEach(r => {
      const d = new Date(r.savedAt);
      const key = `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}`;
      if (!monthMap[key]) monthMap[key] = { label: key, races: 0, purchased: 0, returned: 0 };
      monthMap[key].races++;
      monthMap[key].purchased += parseFloat(r.result.purchased) || 0;
      monthMap[key].returned += parseFloat(r.result.returned) || 0;
    });
    const byMonth = Object.values(monthMap).sort((a, b) => a.label.localeCompare(b.label));

    return {
      total: withResult.length,
      totalPurchased, totalReturned,
      recoveryRate: totalPurchased > 0 ? (totalReturned / totalPurchased * 100) : 0,
      hitRate: withResult.length > 0 ? (hits / withResult.length * 100) : 0,
      hits, byArere, topPayouts, byMonth,
    };
  };
  const stats = showStats ? calcStats() : null;

  return (
    <div className="min-h-screen bg-stone-950 text-stone-100" style={{
      backgroundImage: "radial-gradient(ellipse at top, rgba(45, 60, 40, 0.4) 0%, transparent 60%), radial-gradient(ellipse at bottom, rgba(60, 45, 30, 0.3) 0%, transparent 60%)",
    }}>
      <header className="sticky top-0 z-20 backdrop-blur-md bg-stone-950/80 border-b border-stone-800">
        <div className="px-4 py-3 flex items-center justify-between">
          <div>
            <h1 className="font-display text-2xl font-semibold tracking-wide text-amber-100">
              <span className="text-amber-400">◆</span> Smart予想
            </h1>
            <p className="text-xs text-stone-400 font-serif-jp">スクショから3分で買い目</p>
          </div>
          <div className="flex gap-2 items-center">
            <button onClick={() => setShowImport(true)} className="px-3 py-2 rounded-lg border-2 border-emerald-600 bg-emerald-700 hover:bg-emerald-600 transition flex items-center gap-1.5 text-white text-sm font-serif-jp shadow-lg shadow-emerald-900/50">
              <ClipboardPaste size={16} /><span>取込</span>
            </button>
            <button onClick={() => setShowStats(true)} className="p-2 rounded border border-stone-700 hover:border-sky-600 hover:bg-stone-900 transition" title="統計">
              <BarChart size={18} />
            </button>
            <button onClick={() => setShowSaved(!showSaved)} className="p-2 rounded border border-stone-700 hover:border-amber-600 hover:bg-stone-900 transition" title="保存">
              <FileText size={18} />
            </button>
            <button onClick={resetAll} className="p-2 rounded border border-stone-700 hover:border-rose-700 hover:bg-stone-900 transition" title="リセット">
              <Trash size={18} />
            </button>
          </div>
        </div>
      </header>

      {showSaved && (
        <div className="fixed inset-0 z-30 bg-stone-950/95 overflow-y-auto">
          <div className="p-4">
            <div className="flex justify-between items-center mb-4">
              <h2 className="font-display text-2xl text-amber-200">保存済みレース</h2>
              <button onClick={() => setShowSaved(false)}><X size={24} /></button>
            </div>
            {savedRaces.length === 0 ? (
              <p className="text-stone-400 font-serif-jp">保存されたレースはありません</p>
            ) : (
              <div className="space-y-3">
                {savedRaces.map(s => {
                  const hasResult = s.result && s.result.purchased;
                  const hit = hasResult && (parseFloat(s.result.returned) || 0) > 0;
                  const recovery = hasResult ? ((parseFloat(s.result.returned) || 0) / (parseFloat(s.result.purchased) || 1) * 100) : 0;
                  return (
                    <div key={s.key} className={`border rounded-lg p-3 ${hit ? "border-emerald-800 bg-emerald-950/20" : hasResult ? "border-stone-800 bg-stone-900/60" : "border-stone-800 bg-stone-900/60"}`}>
                      <div className="flex justify-between items-start">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2">
                            <div className="font-serif-jp text-amber-100 truncate">{s.race?.name || "(無題)"}</div>
                            {s.arereScore != null && (
                              <span className="text-xs px-1.5 py-0.5 rounded bg-stone-800 border border-stone-700 text-stone-300 font-mono">荒{s.arereScore}</span>
                            )}
                            {hasResult && (
                              <span className={`text-xs px-1.5 py-0.5 rounded font-mono ${hit ? "bg-emerald-800 text-emerald-100" : "bg-rose-900 text-rose-200"}`}>
                                {hit ? `+${Math.round(recovery)}%` : "外れ"}
                              </span>
                            )}
                          </div>
                          <div className="text-xs text-stone-500 font-mono">
                            {s.race?.course} {s.race?.distance}m / {s.horses?.filter(h => h.uno).length}頭 / {new Date(s.savedAt).toLocaleDateString("ja-JP")}
                          </div>
                          {hasResult && (
                            <div className="text-xs text-stone-400 font-mono mt-1">
                              着順:{s.result.rank1}-{s.result.rank2}-{s.result.rank3} / 購入¥{s.result.purchased} → ¥{s.result.returned}
                            </div>
                          )}
                        </div>
                        <div className="flex flex-col gap-1 ml-2">
                          <button onClick={() => loadRace(s)} className="text-xs px-2 py-1 border border-amber-700 rounded text-amber-300">読込</button>
                          <button onClick={() => openResultInput(s)} className="text-xs px-2 py-1 border border-emerald-700 rounded text-emerald-300 flex items-center gap-1"><Edit size={10}/>結果</button>
                          <button onClick={() => deleteRace(s.key)} className="text-xs px-2 py-1 border border-rose-800 rounded text-rose-400">削除</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {showImport && (
        <div className="fixed inset-0 z-30 bg-stone-950/95 overflow-y-auto">
          <div className="p-4 max-w-3xl mx-auto">
            <div className="flex justify-between items-center mb-4">
              <div>
                <h2 className="font-display text-2xl text-emerald-200">データ取込</h2>
                <p className="text-xs text-stone-400 font-serif-jp mt-1">ClaudeからのJSONを貼り付けて読み込み</p>
              </div>
              <button onClick={() => { setShowImport(false); setImportError(""); }}><X size={24} /></button>
            </div>
            <div className="space-y-3">
              <div className="p-3 border border-emerald-900/60 rounded-lg bg-emerald-950/20 text-xs text-emerald-100 font-serif-jp leading-relaxed">
                <strong className="text-emerald-300">使い方</strong><br/>
                ① Claudeにスクショを送って分析を依頼<br/>
                ② Claudeが返すJSONブロックをコピー<br/>
                ③ 下のテキスト欄に貼り付けて「読み込む」
              </div>
              <textarea
                value={importText} onChange={(e) => setImportText(e.target.value)}
                placeholder='{ "race": {...}, "horses": [...] }'
                rows={12}
                className="w-full bg-stone-900 border border-stone-700 rounded p-3 text-stone-100 placeholder-stone-600 focus:outline-none focus:border-emerald-600 font-mono text-xs"
              />
              {importError && (
                <div className="p-2 border border-rose-800 rounded bg-rose-950/40 text-rose-200 text-xs font-mono">{importError}</div>
              )}
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => { setShowImport(false); setImportError(""); }} className="py-3 border border-stone-700 rounded-lg font-serif-jp">キャンセル</button>
                <button onClick={importData} disabled={!importText.trim()} className="py-3 bg-gradient-to-r from-emerald-700 to-emerald-800 hover:from-emerald-600 disabled:opacity-30 rounded-lg font-serif-jp text-emerald-50">読み込む →</button>
              </div>
              <div className="pt-4 mt-4 border-t border-stone-800">
                <div className="text-xs text-stone-400 font-serif-jp mb-2">または、現在のデータをJSON出力</div>
                <button onClick={exportData} className="w-full py-2 border border-amber-800 rounded text-amber-300 font-serif-jp text-sm hover:bg-amber-950/30 flex items-center justify-center gap-2">
                  {copied ? <><Check size={14}/>コピーしました</> : <><Copy size={14}/>現在のデータをコピー</>}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 結果入力モーダル */}
      {resultInputKey && resultDraft && (
        <div className="fixed inset-0 z-30 bg-stone-950/95 overflow-y-auto">
          <div className="p-4 max-w-2xl mx-auto">
            <div className="flex justify-between items-center mb-4">
              <div>
                <h2 className="font-display text-2xl text-emerald-200">レース結果入力</h2>
                <p className="text-xs text-stone-400 font-serif-jp mt-1">
                  {savedRaces.find(r => r.key === resultInputKey)?.race?.name || "(無題)"}
                </p>
              </div>
              <button onClick={() => { setResultInputKey(null); setResultDraft(null); }}><X size={24} /></button>
            </div>

            <div className="space-y-4">
              <div className="p-3 border border-emerald-900/60 rounded-lg bg-emerald-950/20 text-xs text-emerald-100 font-serif-jp leading-relaxed">
                レース後に着順と払戻を記録すると、回収率分析に反映されます。
              </div>

              <div>
                <Label small>着順（馬番）</Label>
                <div className="grid grid-cols-3 gap-2">
                  <div>
                    <div className="text-xs text-amber-400 font-mono mb-1">1着</div>
                    <Input value={resultDraft.rank1} onChange={v => setResultDraft({...resultDraft, rank1: v})} placeholder="1" type="number" />
                  </div>
                  <div>
                    <div className="text-xs text-stone-300 font-mono mb-1">2着</div>
                    <Input value={resultDraft.rank2} onChange={v => setResultDraft({...resultDraft, rank2: v})} placeholder="2" type="number" />
                  </div>
                  <div>
                    <div className="text-xs text-amber-700 font-mono mb-1">3着</div>
                    <Input value={resultDraft.rank3} onChange={v => setResultDraft({...resultDraft, rank3: v})} placeholder="3" type="number" />
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <Label small>単勝配当（円・参考）</Label>
                  <Input value={resultDraft.payout_tan} onChange={v => setResultDraft({...resultDraft, payout_tan: v})} placeholder="430" type="number" />
                </div>
                <div>
                  <Label small>3連複配当（円・参考）</Label>
                  <Input value={resultDraft.payout_san3} onChange={v => setResultDraft({...resultDraft, payout_san3: v})} placeholder="2580" type="number" />
                </div>
              </div>

              <div className="border-t border-stone-800 pt-4">
                <Label small>あなたの収支</Label>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <div className="text-xs text-rose-400 font-mono mb-1">購入額（円）</div>
                    <Input value={resultDraft.purchased} onChange={v => setResultDraft({...resultDraft, purchased: v})} placeholder="1000" type="number" />
                  </div>
                  <div>
                    <div className="text-xs text-emerald-400 font-mono mb-1">払戻額（円）</div>
                    <Input value={resultDraft.returned} onChange={v => setResultDraft({...resultDraft, returned: v})} placeholder="0" type="number" />
                  </div>
                </div>
                {resultDraft.purchased && (
                  <div className="mt-2 text-xs font-mono text-stone-300">
                    回収率: <span className={parseFloat(resultDraft.returned) >= parseFloat(resultDraft.purchased) ? "text-emerald-400" : "text-rose-400"}>
                      {((parseFloat(resultDraft.returned) || 0) / (parseFloat(resultDraft.purchased) || 1) * 100).toFixed(1)}%
                    </span>
                  </div>
                )}
              </div>

              <div>
                <Label small>メモ（任意）</Label>
                <textarea value={resultDraft.memo} onChange={e => setResultDraft({...resultDraft, memo: e.target.value})}
                  placeholder="気づき・反省など" rows={3}
                  className="w-full bg-stone-900 border border-stone-700 rounded p-2 text-stone-100 placeholder-stone-600 focus:outline-none focus:border-emerald-600 text-sm"
                />
              </div>

              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => { setResultInputKey(null); setResultDraft(null); }} className="py-3 border border-stone-700 rounded-lg font-serif-jp">キャンセル</button>
                <button onClick={saveResult} className="py-3 bg-gradient-to-r from-emerald-700 to-emerald-800 rounded-lg font-serif-jp text-emerald-50 flex items-center justify-center gap-2"><Save size={16}/>記録する</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 統計モーダル */}
      {showStats && stats && (
        <div className="fixed inset-0 z-30 bg-stone-950/95 overflow-y-auto">
          <div className="p-4 max-w-3xl mx-auto">
            <div className="flex justify-between items-center mb-4">
              <h2 className="font-display text-2xl text-sky-200 flex items-center gap-2"><BarChart size={24}/>成績分析</h2>
              <button onClick={() => setShowStats(false)}><X size={24} /></button>
            </div>

            {stats.total === 0 ? (
              <div className="p-6 border border-stone-800 rounded-lg text-center">
                <p className="text-stone-400 font-serif-jp">まだ結果が記録されたレースがありません</p>
                <p className="text-xs text-stone-500 mt-2 font-serif-jp">保存済みレースの「結果」ボタンから入力してください</p>
              </div>
            ) : (
              <div className="space-y-4">
                {/* サマリー */}
                <div className="grid grid-cols-2 gap-3">
                  <div className="p-4 border border-stone-700 rounded-lg bg-stone-900/60">
                    <div className="text-xs text-stone-400 font-serif-jp">累計回収率</div>
                    <div className={`font-display text-3xl mt-1 ${stats.recoveryRate >= 100 ? "text-emerald-400" : "text-rose-400"}`}>
                      {stats.recoveryRate.toFixed(1)}<span className="text-base text-stone-500">%</span>
                    </div>
                    <div className="text-xs text-stone-500 mt-1 font-mono">
                      {stats.totalReturned >= stats.totalPurchased ? "+" : ""}¥{(stats.totalReturned - stats.totalPurchased).toLocaleString()}
                    </div>
                  </div>
                  <div className="p-4 border border-stone-700 rounded-lg bg-stone-900/60">
                    <div className="text-xs text-stone-400 font-serif-jp">的中率</div>
                    <div className="font-display text-3xl mt-1 text-amber-300">
                      {stats.hitRate.toFixed(1)}<span className="text-base text-stone-500">%</span>
                    </div>
                    <div className="text-xs text-stone-500 mt-1 font-mono">{stats.hits}/{stats.total} レース</div>
                  </div>
                </div>

                <div className="p-3 border border-stone-700 rounded-lg bg-stone-900/40">
                  <div className="grid grid-cols-3 gap-2 text-xs font-mono">
                    <div>
                      <div className="text-stone-500">記録レース</div>
                      <div className="text-stone-200 text-base mt-1">{stats.total}</div>
                    </div>
                    <div>
                      <div className="text-stone-500">累計購入</div>
                      <div className="text-rose-300 text-base mt-1">¥{stats.totalPurchased.toLocaleString()}</div>
                    </div>
                    <div>
                      <div className="text-stone-500">累計払戻</div>
                      <div className="text-emerald-300 text-base mt-1">¥{stats.totalReturned.toLocaleString()}</div>
                    </div>
                  </div>
                </div>

                {/* 荒れスコア帯別 */}
                <div>
                  <h3 className="font-display text-xl text-amber-200 mb-2">⚡ 荒れスコア帯別の成績</h3>
                  <div className="space-y-2">
                    {stats.byArere.map((b, i) => (
                      <div key={i} className={`p-3 border rounded-lg ${b.recoveryRate >= 100 ? "border-emerald-800 bg-emerald-950/20" : b.races > 0 ? "border-stone-700 bg-stone-900/40" : "border-stone-800 bg-stone-900/20 opacity-50"}`}>
                        <div className="flex justify-between items-center mb-1">
                          <div className="font-serif-jp text-sm text-stone-200">{b.label}</div>
                          <div className="text-xs font-mono text-stone-500">{b.races}レース</div>
                        </div>
                        {b.races > 0 && (
                          <div className="flex justify-between items-end">
                            <div>
                              <div className="text-xs text-stone-500 font-mono">的中率</div>
                              <div className="font-mono text-amber-300">{b.hitRate.toFixed(1)}%</div>
                            </div>
                            <div className="text-right">
                              <div className="text-xs text-stone-500 font-mono">回収率</div>
                              <div className={`font-mono text-lg ${b.recoveryRate >= 100 ? "text-emerald-400" : "text-rose-400"}`}>
                                {b.recoveryRate.toFixed(1)}%
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                  <div className="text-xs text-stone-500 mt-2 font-serif-jp leading-relaxed p-2">
                    💡 回収率100%超のゾーンが、あなたの得意な狙い目です
                  </div>
                </div>

                {/* TOP配当 */}
                {stats.topPayouts.length > 0 && (
                  <div>
                    <h3 className="font-display text-xl text-amber-200 mb-2 flex items-center gap-2"><Trophy size={20}/>最高配当 TOP5</h3>
                    <div className="space-y-2">
                      {stats.topPayouts.map((p, i) => (
                        <div key={i} className="p-3 border border-amber-800 rounded-lg bg-gradient-to-br from-amber-950/40 to-stone-900/60">
                          <div className="flex justify-between items-center">
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center gap-2">
                                <div className={`text-xl font-display font-bold ${i === 0 ? "text-amber-400" : "text-stone-400"}`}>{i + 1}</div>
                                <div className="font-serif-jp text-amber-100 truncate">{p.race?.name || "(無題)"}</div>
                              </div>
                              <div className="text-xs text-stone-500 font-mono mt-1">
                                {new Date(p.savedAt).toLocaleDateString("ja-JP")} / 荒{p.arereScore}
                              </div>
                            </div>
                            <div className="text-right">
                              <div className="text-xs text-stone-500 font-mono">払戻</div>
                              <div className="font-mono text-lg text-emerald-300">¥{parseFloat(p.result.returned).toLocaleString()}</div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 月別 */}
                {stats.byMonth.length > 0 && (
                  <div>
                    <h3 className="font-display text-xl text-amber-200 mb-2">📊 月別推移</h3>
                    <div className="space-y-1">
                      {stats.byMonth.map((m, i) => {
                        const recovery = m.purchased > 0 ? (m.returned / m.purchased * 100) : 0;
                        return (
                          <div key={i} className="p-2 border border-stone-800 rounded bg-stone-900/40">
                            <div className="flex justify-between items-center">
                              <div className="font-mono text-sm text-stone-200">{m.label}</div>
                              <div className="flex gap-3 text-xs font-mono">
                                <span className="text-stone-500">{m.races}R</span>
                                <span className="text-rose-300">¥{m.purchased.toLocaleString()}</span>
                                <span className="text-emerald-300">¥{m.returned.toLocaleString()}</span>
                                <span className={`${recovery >= 100 ? "text-emerald-400" : "text-rose-400"} font-bold w-14 text-right`}>
                                  {recovery.toFixed(0)}%
                                </span>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}

      <div className="px-4 pt-4">
        <div className="flex gap-1 border-b border-stone-800">
          {[
            { n: 1, label: "①レース", icon: Target },
            { n: 2, label: "②出走馬", icon: Award },
            { n: 3, label: "③分析", icon: Zap },
          ].map(({ n, label, icon: Icon }) => (
            <button key={n} onClick={() => { setStep(n); if (n === 3) setShowResult(true); }}
              className={`flex-1 py-3 px-2 text-sm font-serif-jp transition-all border-b-2 ${step === n ? "border-amber-500 text-amber-200" : "border-transparent text-stone-500"}`}>
              <Icon size={14} /><span className="ml-1">{label}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="p-4 pb-32">
        {step === 1 && (
          <div className="space-y-4">
            <Label>レース名</Label>
            <Input value={race.name} onChange={v => setRace({...race, name: v})} placeholder="例：読売マイラーズC" />
            <div className="grid grid-cols-2 gap-3">
              <div><Label>競馬場</Label><Input value={race.course} onChange={v => setRace({...race, course: v})} placeholder="京都" /></div>
              <div><Label>距離(m)</Label><Input value={race.distance} onChange={v => setRace({...race, distance: v})} placeholder="1600" type="number" /></div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><Label>トラック</Label><Select value={race.track} onChange={v => setRace({...race, track: v})} options={["芝","ダート","障害"]} /></div>
              <div><Label>馬場状態</Label><Select value={race.babaCondition} onChange={v => setRace({...race, babaCondition: v})} options={["良","稍重","重","不良"]} /></div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><Label>レース格</Label><Select value={race.raceClass} onChange={v => setRace({...race, raceClass: v})} options={["G1","G2","G3","L","OP","3勝","2勝","1勝","未勝利","新馬"]} /></div>
              <div className="flex items-end">
                <label className="w-full flex items-center gap-2 p-2 border border-stone-700 rounded cursor-pointer hover:border-amber-600 transition">
                  <input type="checkbox" checked={race.isHandicap} onChange={e => setRace({...race, isHandicap: e.target.checked})} className="w-5 h-5 accent-amber-500" />
                  <span className="font-serif-jp text-sm text-stone-200">ハンデ戦</span>
                </label>
              </div>
            </div>
            <div><Label>当日バイアス（任意）</Label><Input value={race.bias} onChange={v => setRace({...race, bias: v})} placeholder="例：内有利" /></div>
            <label className="flex items-center gap-3 p-4 border border-amber-900/50 rounded-lg bg-amber-950/20 cursor-pointer">
              <input type="checkbox" checked={race.isAreru} onChange={e => setRace({...race, isAreru: e.target.checked})} className="w-5 h-5 accent-amber-500" />
              <div>
                <div className="font-serif-jp text-amber-200">荒れるレース判定</div>
                <div className="text-xs text-stone-400">穴候補のスコアを後押しします</div>
              </div>
            </label>
            <div className="border border-stone-800 rounded-lg p-3 bg-stone-900/40">
              <div className="text-xs text-stone-500 mb-2 font-serif-jp">参考：荒れやすい主要レース</div>
              <div className="grid grid-cols-2 gap-1 text-xs">
                {ARERU_RACES.map((r, i) => (
                  <div key={i} className="text-stone-400 font-mono"><span className="text-amber-600">{r.month}月</span> {r.name}</div>
                ))}
              </div>
            </div>
            <button onClick={() => setStep(2)} className="w-full py-3 mt-4 bg-gradient-to-r from-amber-700 to-amber-800 hover:from-amber-600 rounded-lg font-serif-jp text-amber-50 transition shadow-lg">次へ：出走馬入力 →</button>
          </div>
        )}

        {step === 2 && (
          <div className="space-y-3">
            <div className="text-xs text-stone-500 font-serif-jp p-3 border border-stone-800 rounded bg-stone-900/40">
              💡 推奨上位＋実人気上位の8〜12頭で十分機能します。
            </div>
            {horses.map((h, idx) => (
              <div key={idx} className="border border-stone-800 rounded-lg bg-stone-900/40">
                <div className="p-3 flex items-center gap-2 cursor-pointer" onClick={() => setExpandedHorse(expandedHorse === idx ? null : idx)}>
                  <div className={`w-9 h-9 flex items-center justify-center rounded font-mono font-bold text-sm ${h.uno ? "bg-amber-700 text-amber-50" : "bg-stone-800 text-stone-500"}`}>{h.uno || "?"}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-serif-jp text-sm truncate">{h.name || "馬名未入力"}</div>
                    <div className="text-xs text-stone-500 font-mono">推:{h.est_pop || "-"} 評:{h.rank} 人:{h.pop_tan || "-"} オッズ:{h.odds || "-"}</div>
                  </div>
                  <button onClick={(e) => { e.stopPropagation(); removeHorse(idx); }} className="p-1 text-stone-600 hover:text-rose-400"><Trash2 size={14}/></button>
                  {expandedHorse === idx ? <ChevronUp size={16}/> : <ChevronDown size={16}/>}
                </div>
                {expandedHorse === idx && (
                  <div className="p-3 pt-0 border-t border-stone-800 space-y-3">
                    <div className="grid grid-cols-2 gap-2">
                      <div><Label small>馬番</Label><Input value={h.uno} onChange={v => updateHorse(idx, "uno", v)} placeholder="1" type="number" /></div>
                      <div><Label small>馬名</Label><Input value={h.name} onChange={v => updateHorse(idx, "name", v)} placeholder="馬名" /></div>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <div><Label small>推奨人気</Label><Input value={h.est_pop} onChange={v => updateHorse(idx, "est_pop", v)} placeholder="1" type="number" /></div>
                      <div><Label small>評価</Label><Select value={h.rank} onChange={v => updateHorse(idx, "rank", v)} options={["A","B","C","D","E"]} /></div>
                      <div><Label small>単勝人気</Label><Input value={h.pop_tan} onChange={v => updateHorse(idx, "pop_tan", v)} placeholder="1" type="number" /></div>
                    </div>
                    <div><Label small>単勝オッズ</Label><Input value={h.odds} onChange={v => updateHorse(idx, "odds", v)} placeholder="4.3" type="number" step="0.1" /></div>
                    <div className="space-y-2">
                      <label className="flex items-center gap-2 text-sm font-serif-jp">
                        <input type="checkbox" checked={h.rider_change} onChange={e => updateHorse(idx, "rider_change", e.target.checked)} className="w-4 h-4 accent-amber-500" />
                        騎手乗り替わり（実績騎手）
                      </label>
                      <label className="flex items-center gap-2 text-sm font-serif-jp">
                        <input type="checkbox" checked={h.cond_change} onChange={e => updateHorse(idx, "cond_change", e.target.checked)} className="w-4 h-4 accent-amber-500" />
                        条件変化プラス
                      </label>
                    </div>
                    <div><Label small>前走凡走理由（任意）</Label><Input value={h.bonpaso} onChange={v => updateHorse(idx, "bonpaso", v)} placeholder="展開不向き等" /></div>
                  </div>
                )}
              </div>
            ))}
            <button onClick={addHorse} className="w-full py-3 border border-dashed border-stone-700 rounded-lg text-stone-400 hover:border-amber-600 hover:text-amber-300 transition flex items-center justify-center gap-2"><Plus size={16}/>馬を追加</button>
            <div className="grid grid-cols-2 gap-2 pt-2">
              <button onClick={() => setStep(1)} className="py-3 border border-stone-700 rounded-lg font-serif-jp">← 戻る</button>
              <button onClick={() => { setStep(3); setShowResult(true); }} className="py-3 bg-gradient-to-r from-amber-700 to-amber-800 rounded-lg font-serif-jp text-amber-50">分析 →</button>
            </div>
          </div>
        )}

        {step === 3 && showResult && (
          <div className="space-y-4">
            {scored.length < 3 ? (
              <div className="p-6 border border-rose-800 rounded-lg bg-rose-950/30 text-center">
                <AlertTriangle size={32} />
                <p className="font-serif-jp text-rose-200 mt-3">最低3頭は必要です</p>
                <p className="text-xs text-stone-400 mt-1">馬番・推奨人気・単勝人気の3項目を入力してください</p>
              </div>
            ) : (
              <>
                <div className="p-4 border border-amber-900/50 rounded-lg bg-gradient-to-br from-stone-900 to-stone-900/50">
                  <h2 className="font-serif-jp text-amber-200 text-lg">{race.name || "(無題レース)"}</h2>
                  <div className="text-xs text-stone-400 font-mono mt-1">
                    {race.course} {race.track}{race.distance}m / 馬場:{race.babaCondition} / {race.raceClass}{race.isHandicap && " ハンデ"}
                    {race.isAreru && <span className="ml-2 text-amber-400">⚡荒れ判定</span>}
                  </div>
                  {race.bias && <div className="text-xs text-stone-300 mt-2 font-serif-jp">バイアス: {race.bias}</div>}
                </div>

                {/* 荒れスコア */}
                <div className="p-4 border rounded-lg bg-stone-900/60 border-stone-700">
                  <div className="flex justify-between items-end mb-3">
                    <div>
                      <div className="text-xs font-serif-jp text-stone-400">荒れスコア</div>
                      <div className="font-display text-4xl mt-1" style={{
                        color: arereScoreVal >= 70 ? "#fb923c" : arereScoreVal >= 50 ? "#fbbf24" : arereScoreVal >= 30 ? "#a8a29e" : "#94a3b8"
                      }}>{arereScoreVal}<span className="text-base text-stone-500">/100</span></div>
                    </div>
                    <div className="text-right">
                      <div className="text-xs text-stone-500 font-serif-jp">
                        {arereScoreVal >= 70 ? "🔥 大荒れ予兆" : arereScoreVal >= 50 ? "⚡ 荒れ気味" : arereScoreVal >= 30 ? "📊 標準" : "💎 堅め"}
                      </div>
                    </div>
                  </div>
                  <div className="w-full h-2 bg-stone-800 rounded-full overflow-hidden">
                    <div className="h-full transition-all" style={{
                      width: `${arereScoreVal}%`,
                      background: arereScoreVal >= 70 ? "linear-gradient(to right, #f97316, #ef4444)" :
                                  arereScoreVal >= 50 ? "linear-gradient(to right, #fbbf24, #f97316)" :
                                  arereScoreVal >= 30 ? "linear-gradient(to right, #78716c, #a8a29e)" :
                                  "linear-gradient(to right, #475569, #64748b)"
                    }}></div>
                  </div>
                  {arere.factors.length > 0 && (
                    <details className="mt-3">
                      <summary className="text-xs text-stone-400 font-serif-jp cursor-pointer">スコア内訳を見る</summary>
                      <div className="mt-2 space-y-1">
                        {arere.factors.map((f, i) => (
                          <div key={i} className="flex justify-between text-xs font-mono">
                            <span className="text-stone-300">{f.label}</span>
                            <span className={f.v > 0 ? "text-amber-400" : "text-sky-400"}>{f.v > 0 ? "+" : ""}{f.v}</span>
                          </div>
                        ))}
                      </div>
                    </details>
                  )}
                </div>

                {/* 象限判定 */}
                <div className={`p-4 border-2 rounded-lg ${
                  quadrant.color === "emerald" ? "border-emerald-600 bg-emerald-950/40" :
                  quadrant.color === "amber" ? "border-amber-600 bg-amber-950/40" :
                  quadrant.color === "rose" ? "border-rose-700 bg-rose-950/40" :
                  "border-stone-600 bg-stone-900/60"
                }`}>
                  <div className="text-xs font-serif-jp text-stone-400 mb-1">総合判定（荒れ × 軸信頼度）</div>
                  <div className="font-display text-2xl mb-2" style={{
                    color: quadrant.color === "emerald" ? "#34d399" :
                           quadrant.color === "amber" ? "#fbbf24" :
                           quadrant.color === "rose" ? "#fb7185" : "#d6d3d1"
                  }}>{quadrant.label}</div>
                  <div className="text-sm text-stone-200 font-serif-jp leading-relaxed">{quadrant.advice}</div>
                </div>

                <div className={`p-4 border rounded-lg ${confidence.style}`}>
                  <div className="text-xs font-serif-jp opacity-80">軸信頼度</div>
                  <div className="font-display text-2xl mt-1">{confidence.label}</div>
                </div>
                {overhyped.length > 0 && (
                  <div className="p-3 border border-rose-800 rounded-lg bg-rose-950/30">
                    <div className="flex items-center gap-2 text-rose-300 font-serif-jp text-sm"><AlertTriangle size={16}/>過剰人気の警告</div>
                    <div className="text-xs text-rose-200 mt-1 font-mono">{overhyped.map(h => `${h.uno}${h.name}(推${h.est_pop}vs人${h.pop_tan})`).join(" / ")}</div>
                    <div className="text-xs text-stone-400 mt-1 font-serif-jp">買い目から外す検討余地あり</div>
                  </div>
                )}
                <div>
                  <h3 className="font-display text-xl text-amber-200 mb-2">⌬ スコアランキング</h3>
                  <div className="space-y-2">
                    {scored.map((h, i) => {
                      const gap = parseInt(h.pop_tan) - parseInt(h.est_pop);
                      return (
                        <div key={i} className={`border rounded-lg p-3 ${i === 0 ? "border-amber-600 bg-amber-950/30" : i < 3 ? "border-stone-700 bg-stone-900/60" : "border-stone-800 bg-stone-900/30"}`}>
                          <div className="flex items-center gap-2">
                            <div className={`text-2xl font-display font-bold w-8 ${i === 0 ? "text-amber-400" : "text-stone-500"}`}>{i + 1}</div>
                            <div className="w-8 h-8 flex items-center justify-center rounded font-mono font-bold text-sm bg-stone-800 text-amber-200 border border-stone-700">{h.uno}</div>
                            <div className="flex-1 min-w-0">
                              <div className="font-serif-jp truncate">{h.name}</div>
                              <div className="text-xs text-stone-500 font-mono">推:{h.est_pop} 人:{h.pop_tan} {h.odds}倍</div>
                            </div>
                            <div className="text-right">
                              <div className={`text-lg font-mono font-bold ${h.score >= 30 ? "text-emerald-400" : h.score >= 15 ? "text-amber-400" : h.score < 0 ? "text-rose-400" : "text-stone-300"}`}>{h.score > 0 ? "+" : ""}{h.score}</div>
                              <span className={`text-xs px-1.5 py-0.5 rounded border ${RANK_COLORS[h.rank]}`}>{h.rank}</span>
                            </div>
                          </div>
                          {h.reasons.length > 0 && (
                            <div className="mt-2 pl-10 text-xs text-stone-400 font-serif-jp leading-relaxed">
                              {h.reasons.map((r, ri) => (
                                <div key={ri} className="flex items-start gap-1"><span className="text-amber-700">·</span><span>{r}</span></div>
                              ))}
                            </div>
                          )}
                          {gap >= 4 && <div className="mt-1 pl-10 text-xs text-emerald-400 font-mono flex items-center gap-1"><TrendingUp size={12}/>妙味+{gap}</div>}
                          {gap <= -3 && <div className="mt-1 pl-10 text-xs text-rose-400 font-mono flex items-center gap-1"><TrendingDown size={12}/>過剰人気{gap}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div>
                  <h3 className="font-display text-xl text-amber-200 mb-2">◆ 推奨買い目</h3>
                  <div className="space-y-3">
                    {bets.map((b, i) => (
                      <div key={i} className={`p-4 rounded-lg border ${b.kind === "main" ? "border-amber-700 bg-amber-950/30" : "border-stone-700 bg-stone-900/40"}`}>
                        <div className="flex justify-between items-start mb-2">
                          <div className="font-serif-jp text-amber-100 text-sm">{b.label}</div>
                          <div className="text-xs font-mono text-amber-400">{b.points}点</div>
                        </div>
                        <div className="font-mono text-sm text-stone-200 leading-relaxed">{b.formula}</div>
                      </div>
                    ))}
                  </div>
                  <div className="mt-3 text-xs text-stone-500 font-serif-jp leading-relaxed p-3 border border-stone-800 rounded bg-stone-900/30">
                    ※ 当日の馬場バイアス・最終オッズで最終調整<br/>※ 信頼度「低」は購入見送りも選択肢
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2 pt-2">
                  <button onClick={() => setStep(2)} className="py-3 border border-stone-700 rounded-lg font-serif-jp">← 修正</button>
                  <button onClick={saveRace} className="py-3 bg-gradient-to-r from-emerald-800 to-emerald-900 rounded-lg font-serif-jp text-emerald-50 flex items-center justify-center gap-2"><Save size={16}/>保存</button>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
